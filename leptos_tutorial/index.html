<!DOCTYPE html>
<html>
  <head>
    <style>
      * {
        margin: 0px;
        padding: 0px;
      }
      .red {
        color: red;
      }
      .prod_wrapper {
        padding-top: 75px;
      }
      .modal {
        padding: 50px;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }
      input {
        margin-bottom: 10px;
      }
      textarea {
        margin-bottom: 10px;
      }
      nav {
        justify-content: space-evenly;
        display: flex;
        position: absolute;
      }
      nav > a {
        padding: 14px 16px;
        text-align: center;
        color: white;
        background-color: black;
      }
      nav > a:hover {
        background-color: white;
        color: black;
      }
      li > a {
        display: block;
        padding: 0px;
        margin-bottom: 1px;
        background-color: whitesmoke;
        color: black;
        border: 1px solid black;
        border-radius: 3px;
      }
      li > a:hover {
        background-color: white;
      }
      li > a > div {
        display: inline-flex;
        justify-content: space-between;
      }
      li > a > div > p {
        padding: 5px;
      }
      label{
        white-space: nowrap;
      }
      div > button{
        margin-left: 5px;
      }
      div > input{
        margin-left: 5px;
      }
      textarea{
        vertical-align: middle;
      }
    </style>
  </head>
  <body></body>
</html>
